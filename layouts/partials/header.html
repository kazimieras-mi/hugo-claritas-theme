<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>

	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>

	{{ with .Site.Params.favicon }}
	<link rel="icon" type="image/webp" href="{{ . | relURL }}">
	{{ end }}
	<link rel="stylesheet" href="{{ "css/style.css" | relURL }}" type="text/css" media="all" />
	<link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}" type="text/css" media="all" />

	{{ with .OutputFormats.Get "rss" -}}
		{{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
	{{ end -}}

</head>

<body>

<a href="/" class="title"><h2>{{ .Site.Title }}</h2></a>

{{ partial "nav.html" . }}

<main class="content">
